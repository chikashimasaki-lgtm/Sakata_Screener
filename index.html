<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>酒田五法 シグナル・スクリーナー</title>
<style>
  :root { --bg:#0f1226; --card:#1a1e3a; --line:#2b3160; --mut:#9aa3c7;
          --buy:#3ecf8e; --sell:#ff5d6c; --mix:#ffb454; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:#e8eaf5; }
  header { padding:18px 20px; background:linear-gradient(90deg,#151a3a,#0f1226); border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:18px; }
  .sub { color:var(--mut); font-size:12px; margin-top:4px; }
  .wrap { max-width:1000px; margin:0 auto; padding:16px 20px 60px; }
  .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:14px 0; }
  input, select { background:var(--card); color:#e8eaf5; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px; }
  .meta { color:var(--mut); font-size:12px; margin-left:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:9px 10px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { position:sticky; top:0; background:#141838; color:var(--mut); cursor:pointer; font-weight:600; }
  th.r, td.r { text-align:right; }
  tbody tr:hover { background:#181d40; }
  .dir { font-weight:700; padding:2px 10px; border-radius:999px; font-size:12px; }
  .d-buy { background:rgba(62,207,142,.16); color:var(--buy); }
  .d-sell{ background:rgba(255,93,108,.16); color:var(--sell); }
  .d-mix { background:rgba(255,180,84,.16); color:var(--mix); }
  .sig { color:#c9d2f0; }
  .code { color:var(--mut); font-size:11px; }
  .note { color:var(--mut); font-size:11px; margin-top:18px; line-height:1.6; }
</style>
</head>
<body>
<header>
  <h1>酒田五法 シグナル・スクリーナー</h1>
  <div class="sub">株価の日足から酒田五法シグナルを検出（投資助言ではありません）</div>
</header>
<div class="wrap">
  <div class="controls">
    <input type="search" id="q" placeholder="銘柄名・コードで検索" />
    <select id="dir"><option value="">全方向</option><option value="買い">買い</option><option value="売り">売り</option><option value="混在">混在</option></select>
    <select id="pat"><option value="">全パターン</option>
      <option>赤三兵</option><option>三羽烏(黒三兵)</option><option>三空踏み上げ</option>
      <option>三空叩き込み</option><option>上げ三法</option><option>下げ三法</option></select>
    <span class="meta" id="meta"></span>
  </div>
  <table>
    <thead><tr>
      <th data-k="date">日付</th>
      <th data-k="name">銘柄</th>
      <th data-k="dir">方向</th>
      <th data-k="signals">シグナル</th>
      <th class="r" data-k="close">終値</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="note">
    赤三兵/上げ三法/三空叩き込み＝買い方向、三羽烏/下げ三法/三空踏み上げ＝売り方向。
    シグナルは補助情報でだましもあります。必ずご自身で確認してください。
  </div>
</div>
<script>
const MOCK = { updated:new Date().toISOString(), items:[
  { date:'2026-07-03', code:'7203', name:'（サンプル）トヨタ自動車', dir:'買い', signals:'赤三兵', close:3120 },
  { date:'2026-07-03', code:'6758', name:'（サンプル）ソニーグループ', dir:'買い', signals:'上げ三法', close:14200 },
  { date:'2026-07-03', code:'9984', name:'（サンプル）ソフトバンクG', dir:'売り', signals:'三羽烏(黒三兵)、三空踏み上げ', close:9800 },
  { date:'2026-07-03', code:'6501', name:'（サンプル）日立製作所', dir:'買い', signals:'三空叩き込み', close:3850 },
]};
let DATA = [], sortKey='date', sortAsc=false;
function dirClass(d){ return d==='買い'?'d-buy':d==='売り'?'d-sell':'d-mix'; }
function render(){
  const q=document.getElementById('q').value.trim();
  const dir=document.getElementById('dir').value, pat=document.getElementById('pat').value;
  let rows = DATA.filter(r => (!q||(r.name+r.code).includes(q)) && (!dir||r.dir===dir) && (!pat||String(r.signals).includes(pat)));
  rows.sort((a,b)=>{ let x=a[sortKey],y=b[sortKey];
    if(typeof x==='number'){ return sortAsc?x-y:y-x; }
    x=String(x||'');y=String(y||''); return sortAsc?x.localeCompare(y):y.localeCompare(x); });
  document.getElementById('rows').innerHTML = rows.map(r=>`
    <tr>
      <td>${r.date||''}</td>
      <td>${r.name||''} <span class="code">${r.code||''}</span></td>
      <td><span class="dir ${dirClass(r.dir)}">${r.dir||''}</span></td>
      <td class="sig">${r.signals||''}</td>
      <td class="r">${r.close==null||r.close===''?'':Number(r.close).toLocaleString()}</td>
    </tr>`).join('');
  document.getElementById('meta').textContent = rows.length+'件';
}
document.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; if(!k) return; if(sortKey===k) sortAsc=!sortAsc; else{ sortKey=k; sortAsc=false; } render();
}));
['q','dir','pat'].forEach(id=>document.getElementById(id).addEventListener('input',render));
fetch('sakata_signals.json').then(r=>r.ok?r.json():Promise.reject()).then(j=>{DATA=j.items;boot(j);})
  .catch(()=>{DATA=MOCK.items;boot(MOCK,true);});
function boot(j,mock){ render();
  document.querySelector('.sub').textContent =
    `更新: ${new Date(j.updated).toLocaleString('ja-JP')}${mock?'（サンプル表示）':''}`; }
</script>
</body>
</html>
